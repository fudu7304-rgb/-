  <style>

id-template-columns:42px 1fr auto;gap:10px;align-items:center;text-align:left;color:inherit}.petitem.active{background:var(--soft);border-color:#cfe2d8}.avatar{width:42px;height:42px;border-radius:8px;object-fit:cover;background:#d9ece5}.petitem strong{display:block;font-size:14px}.petitem span{font-size:12px;color:var(--muted)}.badge{min-width:24px;height:24px;border-radius:999px;background:#fff0e8;color:var(--warn);display:grid;place-items:center;font-size:12px;font-weight:700}.main{padding:24px;min-width:0}.top{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:18px}.top h2{margin:0;font-size:26px}.top p{margin:6px 0 0;color:var(--muted)}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.grid{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(310px,.65fr);gap:18px;align-items:start}.panel{background:var(--card);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}.head{padding:17px 17px 0;display:flex;justify-content:space-between;gap:12px}.head h3{margin:0;font-size:16px}.sub{margin:4px 0 0;color:var(--muted);font-size:13px}.body{padding:17px}.hero{display:grid;grid-template-columns:220px 1fr;min-height:230px;overflow:hidden;background:linear-gradient(135deg,#fff,#edf6f1)}.hero img{width:100%;height:100%;min-height:230px;object-fit:cover}.heroin{padding:22px;display:flex;flex-direction:column;justify-content:space-between;gap:16px}.name{display:flex;justify-content:space-between;gap:12px}.name h3{font-size:30px;margin:0}.tags{display:flex;flex-wrap:wrap;gap:8px}.tag{border:1px solid var(--line);border-radius:999px;background:#f1f5ef;min-height:28px;padding:0 10px;display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#415148}.tag.hot{background:#fff0e8;color:var(--warn);border-color:#f1c7ad}.meta{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.mi{border:1px solid #d8e6dd;border-radius:8px;background:rgba(255,255,255,.7);padding:12px;min-height:70px}.ml{font-size:12px;color:var(--muted);margin-bottom:6px}.mv{font-weight:700;overflow-wrap:anywhere}.filters{display:flex;flex-wrap:wrap;gap:6px}.filters button{border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--muted);min-height:34px;padding:0 10px}.filters .on{background:var(--brand);color:#fff;border-color:var(--brand)}.timeline,.reminders{display:grid;gap:10px}.record{border:1px solid var(--line);border-radius:8px;background:#fff;padding:14px;display:grid;grid-template-columns:40px 1fr;gap:12px}.ricon,.rmark{width:40px;height:40px;border-radius:8px;background:#e7f1ed;color:var(--brand2);display:grid;place-items:center}.rhead{display:flex;justify-content:space-between;gap:10px}.rhead h4{margin:0;font-size:16px}.date{color:var(--muted);font-size:12px;white-space:nowrap}.rmeta{margin-top:8px;color:var(--muted);font-size:13px;line-height:1.7}.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.chip{border:1px solid var(--line);border-radius:8px;background:#f7f8f5;color:var(--muted);font-size:12px;min-height:30px;padding:0 10px;display:inline-flex;align-items:center;gap:6px}.right{display:grid;gap:18px}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.stat{border:1px solid var(--line);border-radius:8px;background:#f9faf7;min-height:86px;padding:14px}.stat strong{display:block;font-size:24px}.stat span{font-size:13px;color:var(--muted)}.rem{border:1px solid var(--line);border-radius:8px;background:#fff;padding:12px;display:grid;grid-template-columns:34px 1fr auto;gap:10px;align-items:center}.rem.over{background:#fff8f5;border-color:#f0c4b2}.rem .rmark{width:34px;height:34px}.rem strong{font-size:14px}.rem span{display:block;color:var(--muted);font-size:12px}.empty{border:1px dashed #cfd8d1;border-radius:8px;background:#fbfcfa;text-align:center;color:var(--muted);padding:28px}.empty h3{color:var(--ink);margin:10px 0 6px}dialog{width:min(760px,calc(100vw - 24px));border:0;border-radius:8px;box-shadow:0 24px 70px rgba(20,30,26,.25);padding:0}dialog::backdrop{background:rgba(20,30,26,.4)}.mh{padding:18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px}.mh h3{margin:0;font-size:18px}.mb{padding:18px;max-height:70vh;overflow:auto}.mf{padding:16px 18px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap}.form{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.field{display:grid;gap:7px}.full{grid-column:1/-1}label{font-size:13px;font-weight:700;color:#405147}.hint{font-size:12px;color:var(--muted);line-height:1.5}.dyn{grid-column:1/-1;display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:14px;border:1px solid var(--line);border-radius:8px;background:#f8faf7}.toast{position:fixed;right:20px;bottom:20px;background:#193c35;color:#fff;border-radius:8px;padding:12px 14px;box-shadow:var(--shadow);opacity:0;transform:translateY(8px);transition:.2s}.toast.show{opacity:1;transform:translateY(0)}.print{display:none}@media(max-width:1050px){.app{grid-template-columns:1fr}.side{position:static;height:auto;border-right:0;border-bottom:1px solid var(--line)}.petlist{grid-template-columns:repeat(auto-fill,minmax(210px,1fr))}.grid{grid-template-columns:1fr}}@media(max-width:720px){.main,.side{padding:16px}.top{flex-direction:column}.actions{justify-content:flex-start}.hero,.meta,.form,.dyn,.stats{grid-template-columns:1fr}.hero img{height:210px}.rhead{flex-direction:column}.date{white-space:normal}}@media print{.app,.toast,dialog{display:none!important}.print{display:block;padding:24px}.pt{width:100%;border-collapse:collapse;font-size:12px}.pt th,.pt td{border:1px solid #ddd;padding:8px;text-align:left;vertical-align:top}.ps{border-top:1px solid #ddd;margin-top:14px;padding-top:14px}}

<body>
<div class="app"><aside class="side"><div class="brand"><div class="logo"><i data-lucide="folder-heart"></i></div><div><h1>宠物病例档案</h1><p>健康记录、提醒和导出</p></div></div><div class="search"><i data-lucide="search" size="18"></i><input id="q" placeholder="搜索宠物名称"></div><div class="btns"><button class="btn" id="newPet"><i data-lucide="plus"></i>新增宠物</button><button class="btn2" id="newRecSide"><i data-lucide="file-plus-2"></i>新增记录</button></div><nav class="petlist" id="pets"></nav></aside><main class="main"><div class="top"><div><h2>健康档案工作台</h2><p>按宠物查看病历、疫苗、用药和复诊提醒。</p></div><div class="actions"><button class="ghost" id="export"><i data-lucide="download"></i>导出档案</button><button class="btn" id="newRec"><i data-lucide="file-plus-2"></i>新增健康记录</button></div></div><section id="empty" class="empty" hidden><i data-lucide="paw-print" size="42"></i><h3>先建立第一只宠物档案</h3><p>只需要名称和物种，其他信息可以之后慢慢补。</p><button class="btn" id="emptyNew">新增宠物</button></section><section id="dash" class="grid"><div class="panel"><div id="hero" class="hero"></div></div><aside class="right"><section class="panel"><div class="head"><div><h3>近期提醒</h3><p class="sub">逾期和未来 7 天内的事项</p></div></div><div class="body"><div id="rems" class="reminders"></div></div></section><section class="panel"><div class="head"><div><h3>档案概况</h3><p class="sub">当前宠物的记录统计</p></div></div><div class="body"><div id="stats" class="stats"></div></div></section></aside><section class="panel" style="grid-column:1/-1"><div class="head"><div><h3>健康时间线</h3><p class="sub">按日期倒序展示所有健康记录</p></div><div id="filters" class="filters"></div></div><div class="body"><div id="line" class="timeline"></div></div></section></section></main></div>
<dialog id="petDlg"><form id="petForm" method="dialog"><div class="mh"><h3 id="petTitle">新增宠物</h3><button class="icon" type="button" data-close="petDlg"><i data-lucide="x"></i></button></div><div class="mb"><div class="form"><input type="hidden" id="pid"><div class="field"><label>宠物名称 *</label><input id="pname" required></div><div class="field"><label>物种 *</label><select id="species" required><option value="">请选择</option><option>猫</option><option>狗</option><option>兔</option><option>仓鼠</option><option>鸟</option><option>其他</option></select></div><div class="field"><label>品种</label><input id="breed"></div><div class="field"><label>性别</label><select id="gender"><option value="">未知</option><option>公</option><option>母</option></select></div><div class="field"><label>生日</label><input id="birth" type="date"></div><div class="field"><label>体重 kg</label><input id="weight" type="number" min="0" step="0.1"></div><div class="field"><label>绝育状态</label><select id="neutered"><option value="">未知</option><option value="true">已绝育</option><option value="false">未绝育</option></select></div><div class="field"><label>芯片号</label><input id="chip"></div><div class="field full"><label>头像图片地址</label><input id="avatar"></div><div class="field full"><label>重点备注</label><textarea id="pnotes"></textarea></div></div></div><div class="mf"><button class="ghost" type="button" data-close="petDlg">取消</button><button class="danger" type="button" id="delPet">删除宠物</button><button class="btn" type="submit"><i data-lucide="save"></i>保存</button></div></form></dialog>
<dialog id="recDlg"><form id="recForm" method="dialog"><div class="mh"><h3 id="recTitle">新增健康记录</h3><button class="icon" type="button" data-close="recDlg"><i data-lucide="x"></i></button></div><div class="mb"><div class="form"><input type="hidden" id="rid"><div class="field"><label>关联宠物 *</label><select id="rpet" required></select></div><div class="field"><label>记录类型 *</label><select id="rtype" required></select></div><div class="field"><label>记录日期 *</label><input id="rdate" type="date" required></div><div class="field"><label>标题 *</label><input id="rtitle" required></div><div class="dyn" id="dyn"></div><div class="field"><label>费用</label><input id="cost" type="number" min="0" step="0.01"></div><div class="field"><label>提醒日期</label><input id="remind" type="date"></div><div class="field full"><label>附件</label><input id="files" type="file" multiple accept="image/*,.pdf"><div class="hint">当前原型保存文件名；正式版可接入云存储。</div><div class="chips" id="filechips"></div></div><div class="field full"><label>备注</label><textarea id="rnotes"></textarea></div></div></div><div class="mf"><button class="ghost" type="button" data-close="recDlg">取消</button><button class="danger" type="button" id="delRec">删除记录</button><button class="btn" type="submit"><i data-lucide="save"></i>保存</button></div></form></dialog>
<dialog id="expDlg"><div class="mh"><h3>导出健康档案</h3><button class="icon" type="button" data-close="expDlg"><i data-lucide="x"></i></button></div><div class="mb" id="preview"></div><div class="mf"><button class="ghost" type="button" data-close="expDlg">取消</button><button class="btn" id="print"><i data-lucide="printer"></i>打印或保存 PDF</button></div></dialog><div class="print" id="printArea"></div><div class="toast" id="toast"></div>
<script>
const key="pet-records-v1",today="2026-06-28",types=[['visit','就诊','stethoscope'],['vaccine','疫苗','syringe'],['deworm','驱虫','shield-check'],['medication','用药','pill'],['exam','检查','clipboard-list'],['surgery','手术','scissors'],['weight','体重','scale'],['other','其他','notebook-tabs']],fields={visit:[['hospital','医院','input'],['doctor','医生','input'],['complaint','主诉','textarea'],['diagnosis','诊断','textarea'],['plan','处理方案','textarea']],vaccine:[['item','疫苗名称','input'],['brand','品牌','input'],['batch','批号','input'],['nextDate','下次接种日期','date']],deworm:[['scope','驱虫类型','select','体内,体外,体内外同驱'],['medicine','药品名称','input'],['nextDate','下次驱虫日期','date']],medication:[['medicine','药品名','input'],['dosage','剂量','input'],['frequency','频次','input'],['startDate','开始日期','date'],['endDate','结束日期','date']],exam:[['item','检查项目','input'],['result','结果摘要','textarea']],surgery:[['name','手术名称','input'],['hospital','医院','input'],['care','术后护理','textarea'],['reviewDate','复查日期','date']],weight:[['weight','体重 kg','number']],other:[['summary','摘要','textarea']]};
let state=JSON.parse(localStorage.getItem(key)||'null')||{selected:'p1',filter:'all',pets:[{id:'p1',name:'糯米',species:'猫',breed:'英短',gender:'母',neutered:'true',birthday:'2021-04-18',weight:'4.8',chipNo:'',avatarUrl:'https://images.unsplash.com/photo-1573865526739-10659fec78a5?auto=format&fit=crop&w=700&q=80',notes:'慢性肠胃敏感，青霉素过敏。'},{id:'p2',name:'小满',species:'狗',breed:'柯基',gender:'公',neutered:'false',birthday:'2023-09-03',weight:'10.6',chipNo:'CN23090388',avatarUrl:'https://images.unsplash.com/photo-1612536057832-2ff7ead58194?auto=format&fit=crop&w=700&q=80',notes:'髋关节需定期观察。'}],records:[{id:'r1',petId:'p1',type:'visit',title:'肠胃炎复诊',recordDate:'2026-06-20',cost:'368',details:{hospital:'安心宠物医院',doctor:'李医生',complaint:'软便三天',diagnosis:'轻度肠胃炎',plan:'益生菌 7 天，少量多餐'},notes:'继续观察排便。',attachments:[{name:'血常规报告.pdf',type:'application/pdf'}]},{id:'r2',petId:'p1',type:'vaccine',title:'年度猫三联',recordDate:'2026-05-12',cost:'180',details:{item:'猫三联',brand:'妙三多',batch:'M20260512',nextDate:'2027-05-12'},notes:'留观无异常。',attachments:[{name:'疫苗本照片.jpg',type:'image/jpeg'}]},{id:'r3',petId:'p2',type:'deworm',title:'体内外同驱',recordDate:'2026-06-15',cost:'92',details:{scope:'体内外同驱',medicine:'大宠爱',nextDate:'2026-07-15'},notes:'',attachments:[]}],reminders:[{id:'m1',petId:'p1',recordId:'r1',type:'visit',title:'糯米肠胃炎复诊',remindAt:'2026-06-30',status:'pending'},{id:'m2',petId:'p2',recordId:'r3',type:'deworm',title:'小满下次驱虫',remindAt:'2026-07-15',status:'pending'}]};let staged=[];$=s=>document.querySelector(s);function save(){localStorage.setItem(key,JSON.stringify(state))}function id(p){return p+'-'+Date.now()+Math.random().toString(16).slice(2)}function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}function type(t){return types.find(x=>x[0]==t)||types.at(-1)}function fmt(d){return d?new Date(d+'T00:00:00').toLocaleDateString('zh-CN'):'未填写'}function days(d){return Math.ceil((new Date(d+'T00:00:00')-new Date(today+'T00:00:00'))/864e5)}function age(b){if(!b)return'未知';let d=new Date(b+'T00:00:00'),n=new Date(today+'T00:00:00'),y=n.getFullYear()-d.getFullYear(),m=n.getMonth()-d.getMonth();if(n.getDate()<d.getDate())m--;if(m<0){y--;m+=12}return y>0?`${y} 岁${m?' '+m+' 个月':''}`:`${Math.max(m,1)} 个月`}function pet(){return state.pets.find(p=>p.id==state.selected)||state.pets[0]}function recs(pid){return state.records.filter(r=>r.petId==pid).sort((a,b)=>b.recordDate.localeCompare(a.recordDate))}function av(p){return p.avatarUrl||(p.species=='狗'?'https://images.unsplash.com/photo-1587300003388-59208cc962cb?auto=format&fit=crop&w=700&q=80':'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&w=700&q=80')}function detail(r){let d=r.details||{},a=[];['hospital:医院','doctor:医生','complaint:主诉','diagnosis:诊断','plan:方案','item:项目','brand:品牌','batch:批号','scope:类型','medicine:药品','dosage:剂量','frequency:频次','result:结果','name:手术','care:护理','summary:摘要'].forEach(x=>{let[k,l]=x.split(':');if(d[k])a.push(l+'：'+d[k])});if(d.weight)a.push('体重：'+d.weight+' kg');if(d.nextDate)a.push('下次日期：'+fmt(d.nextDate));if(d.reviewDate)a.push('复查日期：'+fmt(d.reviewDate));return a.join('；')}function draw(){if(state.pets.length&&!state.pets.some(p=>p.id==state.selected))state.selected=state.pets[0].id;drawPets();let p=pet();$('#empty').hidden=!!p;$('#dash').hidden=!p;if(!p)return;let rs=recs(p.id),last=rs[0],med=rs.filter(r=>r.type=='medication').length,neu=p.neutered=='true'?'已绝育':p.neutered=='false'?'未绝育':'未知';$('#hero').innerHTML=`<img src="${esc(av(p))}" alt="${esc(p.name)}"><div class="heroin"><div><div class="name"><div><h3>${esc(p.name)}</h3><p class="sub">${esc(p.species||'宠物')} · ${esc(p.breed||'品种未填写')}</p></div><button class="icon" id="editPet"><i data-lucide="pencil"></i></button></div><div class="tags"><span class="tag"><i data-lucide="calendar-days" size="14"></i>${age(p.birthday)}</span><span class="tag"><i data-lucide="scale" size="14"></i>${esc(p.weight||'未填')} kg</span><span class="tag"><i data-lucide="badge-check" size="14"></i>${neu}</span>${p.notes?'<span class="tag hot"><i data-lucide="triangle-alert" size="14"></i>有重点备注</span>':''}</div></div><div class="meta"><div class="mi"><div class="ml">最近记录</div><div class="mv">${last?esc(last.title):'暂无'}</div></div><div class="mi"><div class="ml">记录总数</div><div class="mv">${rs.length} 条</div></div><div class="mi"><div class="ml">长期用药</div><div class="mv">${med} 项</div></div><div class="mi"><div class="ml">芯片号</div><div class="mv">${esc(p.chipNo||'未填写')}</div></div></div>${p.notes?`<div class="hint">${esc(p.notes)}</div>`:''}</div>`;$('#editPet').onclick=()=>openPet(p);drawRem(p.id);drawStats(p.id);drawFilters();drawLine(p.id);lucide.createIcons()}function drawPets(){let q=$('#q').value.trim().toLowerCase(),list=state.pets.filter(p=>p.name.toLowerCase().includes(q));$('#pets').innerHTML=list.map(p=>`<button class="petitem ${p.id==state.selected?'active':''}" data-pid="${p.id}"><img class="avatar" src="${esc(av(p))}"><span><strong>${esc(p.name)}</strong><span>${esc(p.species||'宠物')} · ${age(p.birthday)}</span></span>${state.reminders.filter(r=>r.petId==p.id&&r.status=='pending').length?'<b class="badge">'+state.reminders.filter(r=>r.petId==p.id&&r.status=='pending').length+'</b>':''}</button>`).join('')||'<div class="empty">没有匹配的宠物</div>';document.querySelectorAll('[data-pid]').forEach(b=>b.onclick=()=>{state.selected=b.dataset.pid;state.filter='all';save();draw()})}function drawRem(pid){let a=state.reminders.filter(r=>r.petId==pid&&r.status=='pending').filter(r=>days(r.remindAt)<=7||days(r.remindAt)<0).sort((a,b)=>a.remindAt.localeCompare(b.remindAt));$('#rems').innerHTML=a.map(r=>{let d=days(r.remindAt),t=type(r.type);return`<div class="rem ${d<0?'over':''}"><div class="rmark"><i data-lucide="${t[2]}"></i></div><div><strong>${esc(r.title)}</strong><span>${fmt(r.remindAt)} · ${d<0?'已逾期 '+Math.abs(d)+' 天':d==0?'今天':d+' 天后'}</span></div><button class="icon" data-done="${r.id}"><i data-lucide="check"></i></button></div>`}).join('')||'<div class="empty">未来 7 天没有待办提醒。</div>';document.querySelectorAll('[data-done]').forEach(b=>b.onclick=()=>{let r=state.reminders.find(x=>x.id==b.dataset.done);if(r)r.status='done';save();draw();toast('提醒已完成')})}function drawStats(pid){let rs=recs(pid),rem=state.reminders.filter(r=>r.petId==pid&&r.status=='pending').length,att=rs.reduce((s,r)=>s+(r.attachments||[]).length,0),lv=rs.find(r=>r.type=='visit');$('#stats').innerHTML=`<div class="stat"><strong>${rs.length}</strong><span>健康记录</span></div><div class="stat"><strong>${rem}</strong><span>待办提醒</span></div><div class="stat"><strong>${att}</strong><span>附件数量</span></div><div class="stat"><strong>${lv?fmt(lv.recordDate).slice(5):'暂无'}</strong><span>最近就诊</span></div>`}function drawFilters(){let fs=[['all','全部',''],...types];$('#filters').innerHTML=fs.map(f=>`<button class="${state.filter==f[0]?'on':''}" data-ft="${f[0]}">${f[1]}</button>`).join('');document.querySelectorAll('[data-ft]').forEach(b=>b.onclick=()=>{state.filter=b.dataset.ft;save();draw()})}function drawLine(pid){let rs=recs(pid);if(state.filter!='all')rs=rs.filter(r=>r.type==state.filter);$('#line').innerHTML=rs.map(r=>{let t=type(r.type);return`<article class="record"><div class="ricon"><i data-lucide="${t[2]}"></i></div><div><div class="rhead"><div><h4>${esc(r.title)}</h4><span class="tag">${t[1]}</span></div><div class="date">${fmt(r.recordDate)}</div></div><div class="rmeta">${detail(r)?'<div>'+esc(detail(r))+'</div>':''}${r.cost?'<div>费用：¥'+esc(r.cost)+'</div>':''}${r.notes?'<div>备注：'+esc(r.notes)+'</div>':''}</div>${(r.attachments||[]).length?'<div class="chips">'+r.attachments.map(f=>`<span class="chip"><i data-lucide="${(f.type||'').includes('pdf')?'file-text':'image'}" size="15"></i>${esc(f.name)}</span>`).join('')+'</div>':''}<div class="actions" style="margin-top:10px"><button class="ghost" data-edit="${r.id}"><i data-lucide="pencil"></i>编辑</button></div></div></article>`}).join('')||'<div class="empty"><i data-lucide="file-heart" size="38"></i><h3>还没有这类记录</h3><p>新增记录后会显示在这里。</p></div>';document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openRec(state.records.find(r=>r.id==b.dataset.edit)))}function opts(){document.querySelector('#rtype').innerHTML=types.map(t=>`<option value="${t[0]}">${t[1]}</option>`).join('');$('#rpet').innerHTML=state.pets.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}function openPet(p){$('#petTitle').textContent=p?'编辑宠物':'新增宠物';$('#pid').value=p?.id||'';$('#pname').value=p?.name||'';$('#species').value=p?.species||'';$('#breed').value=p?.breed||'';$('#gender').value=p?.gender||'';$('#birth').value=p?.birthday||'';$('#weight').value=p?.weight||'';$('#neutered').value=p?.neutered||'';$('#chip').value=p?.chipNo||'';$('#avatar').value=p?.avatarUrl||'';$('#pnotes').value=p?.notes||'';$('#delPet').style.display=p?'inline-flex':'none';$('#petDlg').showModal();lucide.createIcons()}function openRec(r){opts();staged=r?.attachments?structuredClone(r.attachments):[];$('#recTitle').textContent=r?'编辑健康记录':'新增健康记录';$('#rid').value=r?.id||'';$('#rpet').value=r?.petId||state.selected;$('#rtype').value=r?.type||'visit';$('#rdate').value=r?.recordDate||today;$('#rtitle').value=r?.title||'';$('#cost').value=r?.cost||'';$('#rnotes').value=r?.notes||'';$('#remind').value=(state.reminders.find(x=>x.recordId==r?.id&&x.status=='pending')||{}).remindAt||'';$('#delRec').style.display=r?'inline-flex':'none';dyn(r?.details||{});filechips();$('#recDlg').showModal();lucide.createIcons()}function dyn(v){let fs=fields[$('#rtype').value]||[];$('#dyn').innerHTML=fs.map(f=>{let[k,l,tp,ph]=f,val=v[k]||'';if(tp=='textarea')return`<div class="field full"><label>${l}</label><textarea data-d="${k}">${esc(val)}</textarea></div>`;if(tp=='select')return`<div class="field"><label>${l}</label><select data-d="${k}">${ph.split(',').map(o=>`<option ${val==o?'selected':''}>${o}</option>`).join('')}</select></div>`;return`<div class="field"><label>${l}</label><input data-d="${k}" type="${tp}" value="${esc(val)}"></div>`}).join('')}function filechips(){$('#filechips').innerHTML=staged.map((f,i)=>`<span class="chip"><i data-lucide="${(f.type||'').includes('pdf')?'file-text':'image'}" size="15"></i>${esc(f.name)} <button type="button" class="icon" style="width:24px;min-height:24px" data-rm="${i}"><i data-lucide="x" size="14"></i></button></span>`).join('');document.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{staged.splice(+b.dataset.rm,1);filechips()});lucide.createIcons()}function savePet(e){e.preventDefault();let p={id:$('#pid').value||id('p'),name:$('#pname').value.trim(),species:$('#species').value,breed:$('#breed').value.trim(),gender:$('#gender').value,neutered:$('#neutered').value,birthday:$('#birth').value,weight:$('#weight').value,chipNo:$('#chip').value.trim(),avatarUrl:$('#avatar').value.trim(),notes:$('#pnotes').value.trim()},i=state.pets.findIndex(x=>x.id==p.id);i>=0?state.pets[i]=p:state.pets.push(p);state.selected=p.id;save();$('#petDlg').close();draw();toast('宠物档案已保存')}function saveRec(e){e.preventDefault();let details={};document.querySelectorAll('[data-d]').forEach(x=>details[x.dataset.d]=x.value.trim());let r={id:$('#rid').value||id('r'),petId:$('#rpet').value,type:$('#rtype').value,title:$('#rtitle').value.trim(),recordDate:$('#rdate').value,cost:$('#cost').value,details,notes:$('#rnotes').value.trim(),attachments:staged},i=state.records.findIndex(x=>x.id==r.id);i>=0?state.records[i]=r:state.records.push(r);let when=$('#remind').value||details.nextDate||details.reviewDate||'',old=state.reminders.find(x=>x.recordId==r.id);if(when){let p=state.pets.find(x=>x.id==r.petId),pay={petId:r.petId,recordId:r.id,type:r.type,title:`${p?.name||'宠物'}${type(r.type)[1]}提醒：${r.title}`,remindAt:when,status:'pending'};old?Object.assign(old,pay):state.reminders.push({id:id('m'),...pay})}else if(old)state.reminders=state.reminders.filter(x=>x.id!=old.id);state.selected=r.petId;save();$('#recDlg').close();draw();toast('健康记录已保存')}function exp(){let p=pet(),rs=recs(p.id),ms=state.reminders.filter(r=>r.petId==p.id&&r.status=='pending'),h=`<h1>${esc(p.name)} 健康档案</h1><p>生成日期：${fmt(today)}</p><div class="ps"><h3>基础信息</h3><table class="pt"><tr><th>物种</th><td>${esc(p.species||'未填')}</td><th>品种</th><td>${esc(p.breed||'未填')}</td></tr><tr><th>年龄</th><td>${age(p.birthday)}</td><th>体重</th><td>${esc(p.weight||'未填')} kg</td></tr><tr><th>备注</th><td colspan="3">${esc(p.notes||'无')}</td></tr></table></div><div class="ps"><h3>待办提醒</h3>${ms.length?'<table class="pt"><tr><th>日期</th><th>事项</th></tr>'+ms.map(m=>`<tr><td>${fmt(m.remindAt)}</td><td>${esc(m.title)}</td></tr>`).join('')+'</table>':'<p>暂无</p>'}</div><div class="ps"><h3>健康记录</h3>${rs.length?'<table class="pt"><tr><th>日期</th><th>类型</th><th>标题</th><th>摘要</th></tr>'+rs.map(r=>`<tr><td>${fmt(r.recordDate)}</td><td>${type(r.type)[1]}</td><td>${esc(r.title)}</td><td>${esc(detail(r)||r.notes||'')}</td></tr>`).join('')+'</table>':'<p>暂无</p>'}</div>`;$('#preview').innerHTML=h;$('#printArea').innerHTML=h;$('#expDlg').showModal()}function toast(m){let t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>t.classList.remove('show'),1600)}$('#newPet').onclick=()=>openPet();$('#emptyNew').onclick=()=>openPet();$('#newRec').onclick=()=>openRec();$('#newRecSide').onclick=()=>openRec();$('#export').onclick=exp;$('#print').onclick=()=>print();$('#q').oninput=drawPets;$('#petForm').onsubmit=savePet;$('#recForm').onsubmit=saveRec;$('#rtype').onchange=()=>dyn({});$('#files').onchange=e=>{staged.push(...[...e.target.files].slice(0,10).map(f=>({name:f.name,type:f.type,size:f.size})));filechips()};$('#delPet').onclick=()=>{let p=pet();if(confirm(`确定删除 ${p.name} 的档案吗？`)){state.pets=state.pets.filter(x=>x.id!=p.id);state.records=state.records.filter(x=>x.petId!=p.id);state.reminders=state.reminders.filter(x=>x.petId!=p.id);state.selected=state.pets[0]?.id;save();$('#petDlg').close();draw()}};$('#delRec').onclick=()=>{let idv=$('#rid').value,r=state.records.find(x=>x.id==idv);if(r&&confirm(`确定删除记录“${r.title}”吗？`)){state.records=state.records.filter(x=>x.id!=idv);state.reminders=state.reminders.filter(x=>x.recordId!=idv);save();$('#recDlg').close();draw()}};document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>$('#'+b.dataset.close).close());draw();lucide.createIcons();
</script>
