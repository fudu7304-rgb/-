<body>
<div class="app"><aside class="side"><div class="brand"><div class="mark"><i data-lucide="folder-heart"></i></div><div><h1>宠物健康手账</h1><p>病历、提醒和健康小结</p></div></div><div class="search"><i data-lucide="search" size="18"></i><input id="q" type="search" placeholder="搜索宠物名称"></div><div class="nav"><button class="btn" id="addPet"><i data-lucide="plus"></i>新增宠物</button><button class="btn2" id="addRec2"><i data-lucide="file-plus-2"></i>新增记录</button></div><nav class="pets" id="petList"></nav></aside><main class="main"><div class="top"><div><h2>把它的每次健康变化，都好好收起来</h2><p>按宠物整理病历、疫苗、用药和复诊提醒，看医生时不再临时翻相册。</p></div><div class="actions"><button class="ghost" id="exportBtn"><i data-lucide="download"></i>导出档案</button><button class="btn" id="addRec"><i data-lucide="file-plus-2"></i>新增健康记录</button></div></div><section id="emptyApp" class="empty" hidden><i data-lucide="paw-print" size="42"></i><h3>先给家里的小成员建一份健康档案</h3><p>只需要名称和物种，生日、体重、过敏和病历都可以之后慢慢补。</p><button class="btn" id="emptyPet">新增宠物</button></section><section id="dash" class="grid"><div class="panel"><div class="hero" id="hero"></div></div><aside class="right"><section class="panel"><div class="head"><div><h3>近期照护提醒</h3><p class="sub">复诊、疫苗、驱虫和用药别靠记忆硬扛</p></div></div><div class="body"><div class="rems" id="reminders"></div></div></section><section class="panel"><div class="head"><div><h3>健康小结</h3><p class="sub">一眼看清当前宠物的健康资料</p></div></div><div class="body"><div class="stats" id="stats"></div></div></section></aside><section class="panel" style="grid-column:1/-1"><div class="head"><div><h3>健康时间线</h3><p class="sub">把就诊、检查、疫苗和用药按时间串起来</p></div><div class="seg" id="filters"></div></div><div class="body"><div class="timeline" id="timeline"></div></div></section></section></main></div>
<dialog id="petDlg"><form id="petForm" method="dialog"><div class="mh"><h3 id="petTitle">新增宠物</h3><button class="icon" type="button" data-close="petDlg"><i data-lucide="x"></i></button></div><div class="mb"><div class="form"><input type="hidden" id="petId"><div class="field"><label>宠物名称 *</label><input id="petName" required placeholder="例如：糯米"></div><div class="field"><label>物种 *</label><select id="species" required><option value="">请选择</option><option>猫</option><option>狗</option><option>兔</option><option>仓鼠</option><option>鸟</option><option>其他</option></select></div><div class="field"><label>品种</label><input id="breed" placeholder="例如：英短、柯基"></div><div class="field"><label>性别</label><select id="gender"><option value="">未知</option><option>公</option><option>母</option></select></div><div class="field"><label>生日</label><input id="birthday" type="date"></div><div class="field"><label>当前体重 kg</label><input id="weight" type="number" min="0" step="0.1"></div><div class="field"><label>绝育状态</label><select id="neutered"><option value="">未知</option><option value="true">已绝育</option><option value="false">未绝育</option></select></div><div class="field"><label>芯片号</label><input id="chip"></div><div class="field full"><label>头像图片地址</label><input id="avatarUrl" placeholder="可粘贴图片链接，留空使用默认图"></div><div class="field full"><label>重点备注</label><textarea id="petNotes" placeholder="过敏、慢病、禁忌、紧急说明等"></textarea></div></div></div><div class="mf"><button class="ghost" type="button" data-close="petDlg">取消</button><button class="danger" type="button" id="delPet">删除宠物</button><button class="btn" type="submit"><i data-lucide="save"></i>保存</button></div></form></dialog>
<dialog id="recDlg"><form id="recForm" method="dialog"><div class="mh"><h3 id="recTitle">新增健康记录</h3><button class="icon" type="button" data-close="recDlg"><i data-lucide="x"></i></button></div><div class="mb"><div class="form"><input type="hidden" id="recId"><div class="field"><label>关联宠物 *</label><select id="recPet" required></select></div><div class="field"><label>记录类型 *</label><select id="recType" required></select></div><div class="field"><label>记录日期 *</label><input id="recDate" type="date" required></div><div class="field"><label>标题 *</label><input id="recTitleInput" required placeholder="例如：年度疫苗"></div><div class="dyn" id="dyn"></div><div class="field"><label>费用</label><input id="cost" type="number" min="0" step="0.01"></div><div class="field"><label>提醒日期</label><input id="remindAt" type="date"></div><div class="field full"><label>附件</label><input id="files" type="file" multiple accept="image/*,.pdf"><div class="hint">当前原型会保存文件名；正式上线时建议接入云存储。</div><div class="chips" id="fileChips"></div></div><div class="field full"><label>备注</label><textarea id="recNotes" placeholder="补充症状、医生建议或照护情况"></textarea></div></div></div><div class="mf"><button class="ghost" type="button" data-close="recDlg">取消</button><button class="danger" type="button" id="delRec">删除记录</button><button class="btn" type="submit"><i data-lucide="save"></i>保存</button></div></form></dialog>
<dialog id="exportDlg"><div class="mh"><h3>导出健康档案</h3><button class="icon" type="button" data-close="exportDlg"><i data-lucide="x"></i></button></div><div class="mb" id="preview"></div><div class="mf"><button class="ghost" type="button" data-close="exportDlg">取消</button><button class="btn" type="button" id="printBtn"><i data-lucide="printer"></i>打印或保存 PDF</button></div></dialog><div class="printArea" id="printArea"></div><div class="toast" id="toast"></div>
